<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Arial', sans-serif;
}

/* SKY */
.sky {
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(#70c5ce, #aeefff);
    z-index: -5;
}

/* SUN */
.sun {
    position: absolute;
    top: 60px;
    right: 80px;
    width: 80px;
    height: 80px;
    background: radial-gradient(circle, #FFD700, #FFA500);
    border-radius: 50%;
    box-shadow: 0 0 40px rgba(255,165,0,0.7);
}

/* CLOUDS */
.cloud {
    position: absolute;
    width: 120px;
    height: 70px;
    background: white;
    border-radius: 50%;
    opacity: 0.8;
    animation: moveCloud 25s linear infinite;
}

@keyframes moveCloud {
    from { transform: translateX(100vw); }
    to { transform: translateX(-150px); }
}

/* MOUNTAINS */
.mountain {
    position: absolute;
    bottom: 100px;
    width: 0;
    height: 0;
    border-left: 150px solid transparent;
    border-right: 150px solid transparent;
    border-bottom: 200px solid #5c7c3f;
}

.mountain.small {
    border-left: 100px solid transparent;
    border-right: 100px solid transparent;
    border-bottom: 140px solid #6f8f4f;
}

/* BIRD (FACING RIGHT) */
.bird {
    position: absolute;
    left: 20%;
    top: 40%;
    font-size: 45px;
    animation: fly 1s ease-in-out infinite alternate;
    transform: scaleX(-1); /* 👉 FACE RIGHT */
}

@keyframes fly {
    from { transform: translateY(0) scaleX(-1); }
    to { transform: translateY(-25px) scaleX(-1); }
}

/* PIPES */
.pipe {
    position: absolute;
    width: 60px;
    background: #3cb043;
    animation: movePipe 5s linear infinite;
}

.pipe.top { top: 0; height: 200px; }
.pipe.bottom { bottom: 100px; height: 250px; }

.pipe:nth-child(1) { left: 100%; }
.pipe:nth-child(2) { left: 140%; animation-delay: 2.5s; }

@keyframes movePipe {
    from { transform: translateX(0); }
    to { transform: translateX(-120vw); }
}

/* GROUND */
.ground {
    position: fixed;
    bottom: 0;
    width: 200%;
    height: 100px;
    background: repeating-linear-gradient(
        90deg,
        #ded895,
        #ded895 20px,
        #c2b280 20px,
        #c2b280 40px
    );
    animation: moveGround 5s linear infinite;
}

@keyframes moveGround {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
}

/* LOGIN */
.center-box {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-card {
    background: rgba(255,255,255,0.95);
    border-radius: 20px;
    padding: 40px;
    width: 100%;
    max-width: 400px;
    z-index: 2;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}

.game-title {
    text-align: center;
    margin-bottom: 30px;
}

.game-title h1 {
    color: #FFD700;
    font-size: 2.5em;
}

.btn-flappy {
    background: #ffcc00;
    border: none;
    padding: 12px;
    font-weight: bold;
}

.btn-flappy:hover {
    background: #ff9900;
}

.alert {
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="sky"></div>

<!-- SUN -->
<div class="sun"></div>

<!-- CLOUDS -->
<div class="cloud" style="top:20%;"></div>
<div class="cloud" style="top:50%; animation-delay:10s;"></div>

<!-- MOUNTAINS -->
<div class="mountain" style="left:10%;"></div>
<div class="mountain small" style="left:40%;"></div>
<div class="mountain" style="left:70%;"></div>

<!-- BIRD -->
<div class="bird">🐦</div>

<!-- PIPES -->
<div class="pipe top"></div>
<div class="pipe bottom"></div>

<!-- GROUND -->
<div class="ground"></div>

<!-- LOGIN -->
<div class="center-box">
    <div class="login-card">
        <div class="game-title">
            <h1>🐦 Flappy Bird</h1>
            <p class="text-muted">Login to play and compete!</p>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label>Username</label>
                <input type="text" class="form-control" id="username" required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password" class="form-control" id="password" required>
            </div>

            <button type="submit" class="btn btn-flappy w-100 mb-3">Login</button>
        </form>

        <div class="text-center">
            <a href="/register">Register here</a>
        </div>

        <div id="errorMessage" class="alert alert-danger" style="display:none;"></div>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    const btn = e.target.querySelector('button');
    btn.disabled = true;
    btn.textContent = "Logging in...";

    try {
        const response = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok) {
            document.cookie = `access_token=${data.access_token}; path=/`;
            window.location.href = '/dashboard';
        } else {
            showError(data.detail || 'Login failed');
            btn.disabled = false;
            btn.textContent = "Login";
        }
    } catch {
        showError('Error occurred');
        btn.disabled = false;
        btn.textContent = "Login";
    }
});

function showError(msg) {
    const el = document.getElementById('errorMessage');
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 3000);
}
</script>

</body>
</html>
