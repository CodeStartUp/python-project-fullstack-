<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Flappy Bird</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
}

/* SKY */
.sky {
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(#70c5ce, #aeefff);
    z-index: -5;
}

/* SUN */
.sun {
    position: absolute;
    top: 60px;
    right: 80px;
    width: 80px;
    height: 80px;
    background: radial-gradient(circle, #FFD700, #FFA500);
    border-radius: 50%;
    box-shadow: 0 0 40px rgba(255,165,0,0.7);
}

/* CLOUD */
.cloud {
    position: absolute;
    width: 120px;
    height: 70px;
    background: white;
    border-radius: 50%;
    opacity: 0.8;
    animation: moveCloud 25s linear infinite;
}

@keyframes moveCloud {
    from { transform: translateX(100vw); }
    to { transform: translateX(-150px); }
}

/* MOUNTAINS */
.mountain {
    position: absolute;
    bottom: 100px;
    width: 0;
    height: 0;
    border-left: 150px solid transparent;
    border-right: 150px solid transparent;
    border-bottom: 200px solid #5c7c3f;
}

.mountain.small {
    border-left: 100px solid transparent;
    border-right: 100px solid transparent;
    border-bottom: 140px solid #6f8f4f;
}

/* BIRD */
.bird {
    position: absolute;
    left: 15%;
    top: 40%;
    font-size: 45px;
    animation: fly 1s ease-in-out infinite alternate;
    transform: scaleX(-1);
}

@keyframes fly {
    from { transform: translateY(0) scaleX(-1); }
    to { transform: translateY(-25px) scaleX(-1); }
}

/* GLASS CARD */
.register-card {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    color: #fff;
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px);}
    to { opacity: 1; transform: translateY(0);}
}

/* CENTER */
.center-box {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* TITLE */
.game-title h1 {
    text-align: center;
    color: #FFD700;
    font-weight: bold;
}

.game-title p {
    text-align: center;
    color: #eee;
}

/* INPUT */
.form-control {
    border-radius: 12px;
    padding: 12px;
    border: none;
    background: rgba(255,255,255,0.3);
    color: white;
}

.form-control::placeholder {
    color: #eee;
}

.form-control:focus {
    background: rgba(255,255,255,0.4);
    box-shadow: 0 0 0 2px rgba(255,255,255,0.3);
    color: white;
}

/* BUTTON */
.btn-flappy {
    background: linear-gradient(135deg, #ffcc00, #ff9900);
    border: none;
    border-radius: 12px;
    padding: 12px;
    font-weight: bold;
}

.btn-flappy:hover {
    transform: translateY(-2px);
}

/* TEXT */
.form-text {
    color: #ddd;
}

/* ALERT */
.alert {
    border-radius: 12px;
}
</style>
</head>

<body>

<div class="sky"></div>
<div class="sun"></div>

<div class="cloud" style="top:20%;"></div>
<div class="cloud" style="top:50%; animation-delay:10s;"></div>

<div class="mountain" style="left:10%;"></div>
<div class="mountain small" style="left:45%;"></div>
<div class="mountain" style="left:75%;"></div>

<div class="bird">🐦</div>

<div class="center-box">
    <div class="register-card">

        <div class="game-title">
            <h1>🐦 Flappy Bird</h1>
            <p>Create your account</p>
        </div>

        <form id="registerForm">

            <div class="mb-3">
                <input type="text" id="username" class="form-control" placeholder="Username" required minlength="3">
            </div>

            <div class="mb-3">
                <input type="email" id="email" class="form-control" placeholder="Email">
            </div>

            <div class="mb-3">
                <input type="password" id="password" class="form-control" placeholder="Password">
                <div id="passwordStrength" class="form-text"></div>
            </div>

            <div class="mb-3">
                <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm Password">
                <div id="passwordMatch" class="form-text"></div>
            </div>

            <button class="btn btn-flappy w-100">Register 🚀</button>

        </form>

        <div class="text-center mt-3">
            <a href="/" style="color:#FFD700;">Already have account?</a>
        </div>

        <div id="successMessage" class="alert alert-success mt-3" style="display:none;"></div>
        <div id="errorMessage" class="alert alert-danger mt-3" style="display:none;"></div>

    </div>
</div>

<script>
// SAME YOUR LOGIC (unchanged)
function checkPasswordStrength(password) {
    let strength = 0;
    if (password.length >= 6) strength++;
    if (password.length >= 10) strength++;
    if (/[a-z]/.test(password)) strength++;
    if (/[A-Z]/.test(password)) strength++;
    if (/[0-9]/.test(password)) strength++;

    if (password.length === 0) return '';
    if (strength <= 2) return '<span style="color:#ff6b6b">Weak</span>';
    if (strength <= 4) return '<span style="color:#ffd93d">Medium</span>';
    return '<span style="color:#6bcf63">Strong</span>';
}

document.getElementById('password').addEventListener('input', e => {
    document.getElementById('passwordStrength').innerHTML = checkPasswordStrength(e.target.value);
});

document.getElementById('confirmPassword').addEventListener('input', () => {
    const p = password.value;
    const c = confirmPassword.value;
    document.getElementById('passwordMatch').innerHTML =
        p === c ? '<span style="color:#6bcf63">✓ Match</span>' :
        '<span style="color:#ff6b6b">✗ Not match</span>';
});

document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const btn = e.target.querySelector('button');
    btn.disabled = true;
    btn.textContent = "Registering...";

    try {
        const res = await fetch('/api/register', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({
                username: username.value,
                email: email.value,
                password: password.value
            })
        });

        const data = await res.json();

        if (res.ok) {
            showMsg('success', 'Registered! Redirecting...');
            setTimeout(()=> location.href='/', 2000);
        } else {
            showMsg('error', data.detail || 'Error');
            btn.disabled = false;
            btn.textContent = "Register";
        }
    } catch {
        showMsg('error','Network error');
        btn.disabled = false;
        btn.textContent = "Register";
    }
});

function showMsg(type, msg){
    const el = document.getElementById(type==='success'?'successMessage':'errorMessage');
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(()=> el.style.display='none',3000);
}
</script>

</body>
</html>
